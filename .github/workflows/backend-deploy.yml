name: Deploy Backend

on:
  push:
    branches: [main, staging, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, staging, production]

permissions:
  contents: read
  id-token: write   # Required for Workload Identity Federation

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    env:
      GCP_REGION: us-central1
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      ENVIRONMENT: ${{ github.event.inputs.environment || (github.ref_name == 'main' && 'dev' || github.ref_name == 'staging' && 'staging' || 'dev') }}

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/relaypay-${ENVIRONMENT}-images/backend"
          TAG="${{ github.sha }}"

          docker build --platform linux/amd64 -t "${IMAGE}:${TAG}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"

          echo "IMAGE_URI=${IMAGE}:${TAG}" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update "relaypay-${ENVIRONMENT}-api" \
            --image="${IMAGE_URI}" \
            --region="${GCP_REGION}" \
            --project="${GCP_PROJECT_ID}" \
            --quiet

      - name: Show service URL
        run: |
          gcloud run services describe "relaypay-${ENVIRONMENT}-api" \
            --region="${GCP_REGION}" \
            --project="${GCP_PROJECT_ID}" \
            --format="value(status.url)"
