name: Deploy Frontend

on:
  push:
    branches: [main, staging, develop]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, staging, production]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || (github.ref_name == 'main' && 'production' || github.ref_name == 'staging' && 'staging' || 'dev') }}

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_URL: ${{ secrets[format('VITE_API_URL_{0}', env.ENVIRONMENT)] || secrets.VITE_API_URL }}
        run: npm run build

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.FRONTEND_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.FRONTEND_GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Sync to GCS
        run: |
          BUCKET="relaypay-${ENVIRONMENT}-frontend"

          # Upload assets with long cache (Vite hashes filenames)
          gsutil -m -h "Cache-Control:public, max-age=31536000, immutable" \
            cp -r dist/assets gs://${BUCKET}/assets

          # Upload everything else (index.html etc) with no-cache
          gsutil -m -h "Cache-Control:no-cache, no-store, must-revalidate" \
            rsync -r -x "^assets/.*" dist/ gs://${BUCKET}/

      - name: Invalidate CDN cache
        run: |
          gcloud compute url-maps invalidate-cdn-cache \
            "relaypay-${ENVIRONMENT}-frontend-urlmap" \
            --path "/*" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --async \
            --quiet
