name: Deploy Frontend

on:
  push:
    branches: [main, staging, develop]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, staging, production]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || (github.ref_name == 'main' && 'dev' || github.ref_name == 'staging' && 'staging' || 'dev') }}

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.FRONTEND_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.FRONTEND_GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        env:
          VITE_API_URL: ${{ secrets[format('VITE_API_URL_{0}', env.ENVIRONMENT)] || secrets.VITE_API_URL }}
        run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/relaypay-${ENVIRONMENT}-images/frontend"
          TAG="${{ github.sha }}"

          docker build \
            --build-arg VITE_API_URL="${VITE_API_URL}" \
            -t "${IMAGE}:${TAG}" \
            -t "${IMAGE}:latest" .

          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"

          echo "IMAGE_URI=${IMAGE}:${TAG}" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update "relaypay-${ENVIRONMENT}-frontend" \
            --image="${IMAGE_URI}" \
            --region="${{ secrets.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --quiet

      - name: Show service URL
        run: |
          gcloud run services describe "relaypay-${ENVIRONMENT}-frontend" \
            --region="${{ secrets.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --format="value(status.url)"
