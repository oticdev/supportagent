services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: relaypay
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay -d relaypay"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
